<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>키오스크 진행 상황</title>
  <link rel="stylesheet" href="/kiosk.css">
  <link rel="stylesheet" href="/kiosk-print.css" media="print">
</head>
<body>
  <main>
    <nav class="top-nav" aria-label="page navigation">
      <a href="/kiosk" data-nav-route="kiosk" class="active">Kiosk</a>
      <a href="/insert" data-nav-route="insert">Insert</a>
    </nav>

    <section class="header">
      <h1>사용자별 프로젝트 현황</h1>
      <p>사용자를 터치하면 프로젝트 목록이 열리고, 프로젝트를 고르면 상세 목업 화면이 열립니다</p>
      <div class="deadline-bar">
        <span>지금 시간: <strong id="currentTime">-</strong></span>
        <span>최종 마감: <strong id="deadlineText">2026-07-31</strong></span>
        <span>남은 시간: <strong id="deadlineCountdown">-</strong></span>
      </div>
    </section>

    <p id="message">불러오는 중...</p>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>사용자</th>
            <th>프로젝트 수</th>
            <th>코멘트</th>
          </tr>
        </thead>
        <tbody id="projects"></tbody>
      </table>
    </div>
  </main>

  <div class="modal" id="userModal">
    <div class="modal-body modal-wide" role="dialog" aria-modal="true" aria-labelledby="userModalTitle">
      <h2 id="userModalTitle">사용자 프로젝트</h2>
      <div class="student-id" id="userModalStudentId">-</div>
      <section class="detail-block">
        <h3>프로젝트 목록</h3>
        <div class="project-list" id="userProjectList"></div>
      </section>
      <div class="modal-actions">
        <button id="closeUserModalButton" type="button">닫기</button>
      </div>
    </div>
  </div>

  <div class="modal" id="projectModal">
    <div class="modal-body modal-wide" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <h2 id="modalTitle">프로젝트 목업</h2>
      <div class="student-id" id="modalStudentId">-</div>
      <div class="project-name" id="modalProjectName">-</div>
      <div class="student-progress" id="modalProjectProgress">-</div>

      <section class="detail-block">
        <h3>추천 일정</h3>
        <div class="schedule-list modal-schedule-list" id="projectScheduleList"></div>
      </section>

      <section class="detail-block" id="deploymentBlock" hidden>
        <h3>배포판</h3>
        <p class="detail-copy" id="deploymentUrlText"></p>
        <button class="preview-button" id="openDeploymentButton" type="button">배포판 목업 열기</button>
      </section>

      <section class="detail-block">
        <h3>피드백 (교수님)</h3>
        <p id="modalProfessorFeedback" class="detail-copy">아직 입력된 피드백이 없습니다.</p>
      </section>

      <section class="detail-block">
        <h3>코멘트</h3>
        <div class="comment-list" id="modalCommentList"></div>
        <form id="commentForm" class="comment-form">
          <input id="commentAuthorInput" type="text" placeholder="작성자 (예: kopo05)">
          <textarea id="commentInput" rows="3" placeholder="누구나 코멘트를 남길 수 있습니다"></textarea>
          <button type="submit">코멘트 등록</button>
        </form>
      </section>

      <div class="modal-actions">
        <button id="closeModalButton" type="button">닫기</button>
      </div>
    </div>
  </div>

  <div class="deployment-preview" id="deploymentPreview" aria-hidden="true">
    <div class="deployment-preview-bar">
      <button id="closeDeploymentButton" type="button">화면닫기</button>
      <span id="deploymentPreviewTitle">배포판 목업</span>
    </div>
    <iframe id="deploymentFrame" title="프로젝트 배포판 목업"></iframe>
  </div>

  <script>
    const projectsTable = document.getElementById("projects");
    const message = document.getElementById("message");
    const userModal = document.getElementById("userModal");
    const userModalStudentId = document.getElementById("userModalStudentId");
    const userProjectList = document.getElementById("userProjectList");
    const closeUserModalButton = document.getElementById("closeUserModalButton");
    const modal = document.getElementById("projectModal");
    const modalStudentId = document.getElementById("modalStudentId");
    const modalProjectName = document.getElementById("modalProjectName");
    const modalProjectProgress = document.getElementById("modalProjectProgress");
    const deploymentBlock = document.getElementById("deploymentBlock");
    const deploymentUrlText = document.getElementById("deploymentUrlText");
    const openDeploymentButton = document.getElementById("openDeploymentButton");
    const deploymentPreview = document.getElementById("deploymentPreview");
    const closeDeploymentButton = document.getElementById("closeDeploymentButton");
    const deploymentFrame = document.getElementById("deploymentFrame");
    const deploymentPreviewTitle = document.getElementById("deploymentPreviewTitle");
    const modalProfessorFeedback = document.getElementById("modalProfessorFeedback");
    const modalCommentList = document.getElementById("modalCommentList");
    const closeModalButton = document.getElementById("closeModalButton");
    const commentForm = document.getElementById("commentForm");
    const commentAuthorInput = document.getElementById("commentAuthorInput");
    const commentInput = document.getElementById("commentInput");
    const projectScheduleList = document.getElementById("projectScheduleList");
    let latestProjects = [];
    let latestUsers = [];
    let activeProjectId = null;
    let activeProjectProgress = "";
    let activeDeploymentUrl = "";
    let currentDeadline = "2026-07-31";
    const recommendedPhases = [
      "기획",
      "프로토타입",
      "실제 제작 시작",
      "최종 테스트",
      "완료"
    ];

    function setTopNavLinks() {
      document.querySelectorAll("[data-nav-route]").forEach((link) => {
        link.href = `${location.origin}/${link.dataset.navRoute}`;
      });
    }

    function getProjectsApiUrl() {
      if (location.protocol === "file:") {
        return "http://localhost:703/api/projects";
      }

      return "/api/projects";
    }

    function getSettingsApiUrl() {
      if (location.protocol === "file:") {
        return "http://localhost:703/api/settings";
      }

      return "/api/settings";
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function pad(value) {
      return String(value).padStart(2, "0");
    }

    function formatCurrentTime(date) {
      return [
        date.getFullYear(),
        pad(date.getMonth() + 1),
        pad(date.getDate())
      ].join("-") + " " + [
        pad(date.getHours()),
        pad(date.getMinutes())
      ].join(":");
    }

    function formatUpdatedHour(isoString) {
      if (!isoString) return "-";

      const date = new Date(isoString);
      if (Number.isNaN(date.getTime())) return "-";

      return [
        date.getFullYear(),
        pad(date.getMonth() + 1),
        pad(date.getDate())
      ].join("-") + " " + pad(date.getHours()) + "시";
    }

    function formatDeadlineCountdown(now, deadline) {
      const diffMs = deadline.getTime() - now.getTime();

      if (diffMs <= 0) {
        return "D-day";
      }

      const totalMinutes = Math.floor(diffMs / 60000);
      const days = Math.floor(totalMinutes / 1440);
      const hours = Math.floor((totalMinutes % 1440) / 60);
      const minutes = totalMinutes % 60;

      return `D-${days} ${hours}h ${minutes}m`;
    }

    function formatDate(date) {
      return [
        date.getFullYear(),
        pad(date.getMonth() + 1),
        pad(date.getDate())
      ].join("-");
    }

    function buildRecommendedSchedule(now, deadlineText) {
      const [year, month, day] = deadlineText.split("-").map(Number);
      const remainingPhases = (() => {
        const currentIndex = recommendedPhases.indexOf(activeProjectProgress);
        if (currentIndex === -1) {
          return recommendedPhases;
        }

        return recommendedPhases.slice(currentIndex);
      })();
      const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      const end = new Date(year, month - 1, day);
      const remainingDays = Math.max(0, Math.ceil((end - today) / 86400000));

      if (remainingDays === 0) {
        return remainingPhases.map((phase) => ({ phase, dueDate: formatDate(end) }));
      }

      return remainingPhases.map((phase, index) => {
        const offset = Math.ceil(((index + 1) * remainingDays) / remainingPhases.length);
        const dueDate = new Date(today);
        dueDate.setDate(today.getDate() + offset);

        return { phase, dueDate: formatDate(dueDate > end ? end : dueDate) };
      });
    }

    function updateDeadlineClock() {
      const now = new Date();
      const [year, month, day] = currentDeadline.split("-").map(Number);
      const deadline = new Date(year, month - 1, day, 23, 59, 59);

      document.getElementById("currentTime").textContent = formatCurrentTime(now);
      document.getElementById("deadlineText").textContent = currentDeadline;
      document.getElementById("deadlineCountdown").textContent = formatDeadlineCountdown(now, deadline);
      renderRecommendedSchedule(now);
    }

    function renderRecommendedSchedule(now = new Date()) {
      projectScheduleList.innerHTML = buildRecommendedSchedule(now, currentDeadline).map((item) => `
        <article class="schedule-item">
          <strong>${escapeHtml(item.phase)}</strong>
          <span>${escapeHtml(item.dueDate)}까지</span>
        </article>
      `).join("");
    }

    function formatCommentTime(isoString) {
      const date = new Date(isoString);
      return formatCurrentTime(date);
    }

    async function readJson(response) {
      const contentType = response.headers.get("content-type") || "";

      if (!contentType.includes("application/json")) {
        const text = await response.text();
        throw new Error(text.trim().slice(0, 50) || "JSON 응답이 아닙니다.");
      }

      const data = await response.json();

      if (!response.ok) {
        throw new Error(data.message || data.error || "요청을 처리하지 못했습니다.");
      }

      return data;
    }

    async function loadProjects() {
      try {
        const response = await fetch(getProjectsApiUrl());
        const data = await readJson(response);
        latestProjects = data.projects;
        latestUsers = groupProjectsByStudent(data.projects);

        projectsTable.innerHTML = latestUsers.map((user, index) => `
          <tr tabindex="0" data-index="${index}">
            <td>${escapeHtml(user.studentId)}</td>
            <td>
              <div class="project-cell">
                <strong>${user.projects.length}개 <span class="latest-update">${escapeHtml(formatUpdatedHour(user.latestUpdatedAt))}</span></strong>
                <span>${escapeHtml(user.projectNames)}</span>
              </div>
            </td>
            <td class="feedback-cell">${user.latestComment ? escapeHtml(user.latestComment) : "-"}</td>
          </tr>
        `).join("");

        message.textContent = `${latestUsers.length}명 / ${data.projects.length}개 프로젝트 표시 중`;
      } catch (error) {
        message.textContent = `오류: ${error.message}`;
      }
    }

    async function loadSettings() {
      try {
        const response = await fetch(getSettingsApiUrl());
        const data = await readJson(response);
        currentDeadline = data.settings.deadline || "2026-07-31";
        updateDeadlineClock();
      } catch (error) {
        message.textContent = `오류: ${error.message}`;
      }
    }

    function groupProjectsByStudent(projects) {
      const groups = new Map();

      projects.forEach((project) => {
        if (!groups.has(project.studentId)) {
          groups.set(project.studentId, {
            studentId: project.studentId,
            projects: [],
            latestComment: "",
            latestUpdatedAt: ""
          });
        }

        const group = groups.get(project.studentId);
        group.projects.push(project);
        if (!group.latestUpdatedAt || new Date(project.updatedAt) > new Date(group.latestUpdatedAt)) {
          group.latestUpdatedAt = project.updatedAt;
        }
        if (project.latestComment) {
          group.latestComment = project.latestComment;
        }
      });

      return [...groups.values()].map((group) => ({
        ...group,
        projectNames: group.projects.map((project) => project.projectName).join(", ")
      }));
    }

    async function loadProjectDetail(projectId) {
      const response = await fetch(`${getProjectsApiUrl()}/${projectId}`);
      const data = await readJson(response);
      return data.project;
    }

    function renderComments(comments) {
      if (!comments.length) {
        modalCommentList.innerHTML = '<p class="empty-copy">아직 등록된 코멘트가 없습니다.</p>';
        return;
      }

      modalCommentList.innerHTML = comments.map((comment) => `
        <article class="comment-card">
          <div class="comment-meta">
            <span class="comment-time">${escapeHtml(formatCommentTime(comment.createdAt))}</span>
            <span class="comment-author">${escapeHtml(comment.author || "작성자 없음")}</span>
          </div>
          <div class="comment-copy">${escapeHtml(comment.comment)}</div>
        </article>
      `).join("");
    }

    async function openProjectModal(projectId) {
      const project = await loadProjectDetail(projectId);

      activeProjectId = project.id;
      activeProjectProgress = project.progress || "";
      activeDeploymentUrl = project.deploymentUrl || "";
      modalStudentId.textContent = project.studentId;
      modalProjectName.textContent = project.projectName;
      modalProjectProgress.textContent = `지금 진행중인 ${project.projectName}: 진행상황 ${project.progress}`;
      renderRecommendedSchedule();
      deploymentBlock.hidden = !activeDeploymentUrl;
      deploymentUrlText.textContent = activeDeploymentUrl;
      modalProfessorFeedback.textContent = project.professorFeedback || "아직 입력된 피드백이 없습니다.";
      renderComments(project.comments);
      commentAuthorInput.value = "";
      commentInput.value = "";
      modal.classList.add("open");
    }

    function openUserModal(user) {
      userModalStudentId.textContent = user.studentId;
      userProjectList.innerHTML = user.projects.map((project) => `
        <button class="project-option" type="button" data-project-id="${project.id}">
          <strong>${escapeHtml(project.projectName)}</strong>
          <span>진행상황: ${escapeHtml(project.progress)}</span>
          <em>${project.latestComment ? escapeHtml(project.latestComment) : "코멘트 없음"}</em>
        </button>
      `).join("");
      userModal.classList.add("open");
    }

    function closeUserModal() {
      userModal.classList.remove("open");
    }

    function closeProjectModal() {
      modal.classList.remove("open");
      activeProjectId = null;
      activeProjectProgress = "";
    }

    function openDeploymentPreview() {
      if (!activeDeploymentUrl) return;

      deploymentPreviewTitle.textContent = `${modalProjectName.textContent} 배포판 목업`;
      deploymentFrame.src = activeDeploymentUrl;
      deploymentPreview.classList.add("open");
      deploymentPreview.setAttribute("aria-hidden", "false");
    }

    function closeDeploymentPreview() {
      deploymentPreview.classList.remove("open");
      deploymentPreview.setAttribute("aria-hidden", "true");
      deploymentFrame.src = "about:blank";
    }

    projectsTable.addEventListener("click", async (event) => {
      const row = event.target.closest("tr");
      if (!row) return;

      const user = latestUsers[Number(row.dataset.index)];
      if (!user) return;

      try {
        openUserModal(user);
      } catch (error) {
        message.textContent = `오류: ${error.message}`;
      }
    });

    projectsTable.addEventListener("keydown", async (event) => {
      if (event.key !== "Enter" && event.key !== " ") return;
      const row = event.target.closest("tr");
      if (!row) return;

      event.preventDefault();
      const user = latestUsers[Number(row.dataset.index)];
      if (!user) return;

      try {
        openUserModal(user);
      } catch (error) {
        message.textContent = `오류: ${error.message}`;
      }
    });

    userProjectList.addEventListener("click", async (event) => {
      const button = event.target.closest("[data-project-id]");
      if (!button) return;

      try {
        closeUserModal();
        await openProjectModal(Number(button.dataset.projectId));
      } catch (error) {
        message.textContent = `오류: ${error.message}`;
      }
    });

    commentForm.addEventListener("submit", async (event) => {
      event.preventDefault();

      if (!activeProjectId) return;

      try {
        await readJson(await fetch(`${getProjectsApiUrl()}/${activeProjectId}/comments`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            author: commentAuthorInput.value,
            comment: commentInput.value
          })
        }));

        await openProjectModal(activeProjectId);
        await loadProjects();
      } catch (error) {
        message.textContent = `오류: ${error.message}`;
      }
    });

    modal.addEventListener("click", (event) => {
      if (event.target === modal) {
        closeProjectModal();
      }
    });

    userModal.addEventListener("click", (event) => {
      if (event.target === userModal) {
        closeUserModal();
      }
    });

    closeUserModalButton.addEventListener("click", closeUserModal);
    closeModalButton.addEventListener("click", closeProjectModal);
    openDeploymentButton.addEventListener("click", openDeploymentPreview);
    closeDeploymentButton.addEventListener("click", closeDeploymentPreview);

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") {
        closeDeploymentPreview();
        closeUserModal();
        closeProjectModal();
      }
    });

    setTopNavLinks();
    loadProjects();
    loadSettings();
    setInterval(loadProjects, 30000);
    setInterval(updateDeadlineClock, 1000);
  </script>
</body>
</html>
