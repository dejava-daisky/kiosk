<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>키오스크 진행 상황</title>
  <link rel="stylesheet" href="/kiosk.css">
  <link rel="stylesheet" href="/kiosk-print.css" media="print">
</head>
<body>
  <main>
    <section class="header">
      <h1>사용자별 프로젝트 현황</h1>
      <p>사용자 또는 프로젝트를 터치하면 상세 목업 화면이 열립니다</p>
      <div class="deadline-bar">
        <span>지금 시간: <strong id="currentTime">-</strong></span>
        <span>최종 마감: <strong>2026-07-31</strong></span>
        <span>남은 시간: <strong id="deadlineCountdown">-</strong></span>
      </div>
    </section>

    <p id="message">불러오는 중...</p>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>사용자</th>
            <th>프로젝트</th>
            <th>코멘트</th>
          </tr>
        </thead>
        <tbody id="projects"></tbody>
      </table>
    </div>
  </main>

  <div class="modal" id="projectModal">
    <div class="modal-body modal-wide" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <h2 id="modalTitle">프로젝트 목업</h2>
      <div class="student-id" id="modalStudentId">-</div>
      <div class="project-name" id="modalProjectName">-</div>
      <div class="student-progress" id="modalProjectProgress">-</div>

      <section class="detail-block">
        <h3>피드백 (교수님)</h3>
        <p id="modalProfessorFeedback" class="detail-copy">아직 입력된 피드백이 없습니다.</p>
      </section>

      <section class="detail-block">
        <h3>코멘트</h3>
        <div class="comment-list" id="modalCommentList"></div>
        <form id="commentForm" class="comment-form">
          <textarea id="commentInput" rows="3" placeholder="누구나 코멘트를 남길 수 있습니다"></textarea>
          <button type="submit">코멘트 등록</button>
        </form>
      </section>

      <div class="modal-actions">
        <button id="closeModalButton" type="button">닫기</button>
      </div>
    </div>
  </div>

  <script>
    const projectsTable = document.getElementById("projects");
    const message = document.getElementById("message");
    const modal = document.getElementById("projectModal");
    const modalStudentId = document.getElementById("modalStudentId");
    const modalProjectName = document.getElementById("modalProjectName");
    const modalProjectProgress = document.getElementById("modalProjectProgress");
    const modalProfessorFeedback = document.getElementById("modalProfessorFeedback");
    const modalCommentList = document.getElementById("modalCommentList");
    const closeModalButton = document.getElementById("closeModalButton");
    const commentForm = document.getElementById("commentForm");
    const commentInput = document.getElementById("commentInput");
    let latestProjects = [];
    let activeProjectId = null;

    function getProjectsApiUrl() {
      if (location.protocol === "file:") {
        return "http://localhost:703/api/projects";
      }

      return "/api/projects";
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function pad(value) {
      return String(value).padStart(2, "0");
    }

    function formatCurrentTime(date) {
      return [
        date.getFullYear(),
        pad(date.getMonth() + 1),
        pad(date.getDate())
      ].join("-") + " " + [
        pad(date.getHours()),
        pad(date.getMinutes())
      ].join(":");
    }

    function formatDeadlineCountdown(now, deadline) {
      const diffMs = deadline.getTime() - now.getTime();

      if (diffMs <= 0) {
        return "D-day";
      }

      const totalMinutes = Math.floor(diffMs / 60000);
      const days = Math.floor(totalMinutes / 1440);
      const hours = Math.floor((totalMinutes % 1440) / 60);
      const minutes = totalMinutes % 60;

      return `D-${days} ${hours}h ${minutes}m`;
    }

    function updateDeadlineClock() {
      const now = new Date();
      const deadline = new Date(2026, 6, 31, 23, 59, 59);

      document.getElementById("currentTime").textContent = formatCurrentTime(now);
      document.getElementById("deadlineCountdown").textContent = formatDeadlineCountdown(now, deadline);
    }

    function formatCommentTime(isoString) {
      const date = new Date(isoString);
      return formatCurrentTime(date);
    }

    async function readJson(response) {
      const contentType = response.headers.get("content-type") || "";

      if (!contentType.includes("application/json")) {
        const text = await response.text();
        throw new Error(text.trim().slice(0, 50) || "JSON 응답이 아닙니다.");
      }

      const data = await response.json();

      if (!response.ok) {
        throw new Error(data.message || data.error || "요청을 처리하지 못했습니다.");
      }

      return data;
    }

    async function loadProjects() {
      try {
        const response = await fetch(getProjectsApiUrl());
        const data = await readJson(response);
        latestProjects = data.projects;

        projectsTable.innerHTML = data.projects.map((project, index) => `
          <tr tabindex="0" data-index="${index}">
            <td>${escapeHtml(project.studentId)}</td>
            <td>
              <div class="project-cell">
                <strong>${escapeHtml(project.projectName)}</strong>
                <span>진행상황: ${escapeHtml(project.progress)}</span>
              </div>
            </td>
            <td class="feedback-cell">${project.latestComment ? escapeHtml(project.latestComment) : "-"}</td>
          </tr>
        `).join("");

        message.textContent = `${data.projects.length}개 프로젝트 표시 중`;
      } catch (error) {
        message.textContent = `오류: ${error.message}`;
      }
    }

    async function loadProjectDetail(projectId) {
      const response = await fetch(`${getProjectsApiUrl()}/${projectId}`);
      const data = await readJson(response);
      return data.project;
    }

    function renderComments(comments) {
      if (!comments.length) {
        modalCommentList.innerHTML = '<p class="empty-copy">아직 등록된 코멘트가 없습니다.</p>';
        return;
      }

      modalCommentList.innerHTML = comments.map((comment) => `
        <article class="comment-card">
          <div class="comment-time">${escapeHtml(formatCommentTime(comment.createdAt))}</div>
          <div class="comment-copy">${escapeHtml(comment.comment)}</div>
        </article>
      `).join("");
    }

    async function openProjectModal(projectId) {
      const project = await loadProjectDetail(projectId);

      activeProjectId = project.id;
      modalStudentId.textContent = project.studentId;
      modalProjectName.textContent = project.projectName;
      modalProjectProgress.textContent = `지금 진행중인 ${project.projectName}: 진행상황 ${project.progress}`;
      modalProfessorFeedback.textContent = project.professorFeedback || "아직 입력된 피드백이 없습니다.";
      renderComments(project.comments);
      commentInput.value = "";
      modal.classList.add("open");
    }

    function closeProjectModal() {
      modal.classList.remove("open");
      activeProjectId = null;
    }

    projectsTable.addEventListener("click", async (event) => {
      const row = event.target.closest("tr");
      if (!row) return;

      const project = latestProjects[Number(row.dataset.index)];
      if (!project) return;

      try {
        await openProjectModal(project.id);
      } catch (error) {
        message.textContent = `오류: ${error.message}`;
      }
    });

    projectsTable.addEventListener("keydown", async (event) => {
      if (event.key !== "Enter" && event.key !== " ") return;
      const row = event.target.closest("tr");
      if (!row) return;

      event.preventDefault();
      const project = latestProjects[Number(row.dataset.index)];
      if (!project) return;

      try {
        await openProjectModal(project.id);
      } catch (error) {
        message.textContent = `오류: ${error.message}`;
      }
    });

    commentForm.addEventListener("submit", async (event) => {
      event.preventDefault();

      if (!activeProjectId) return;

      try {
        await readJson(await fetch(`${getProjectsApiUrl()}/${activeProjectId}/comments`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ comment: commentInput.value })
        }));

        await openProjectModal(activeProjectId);
        await loadProjects();
      } catch (error) {
        message.textContent = `오류: ${error.message}`;
      }
    });

    modal.addEventListener("click", (event) => {
      if (event.target === modal) {
        closeProjectModal();
      }
    });

    closeModalButton.addEventListener("click", closeProjectModal);

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") {
        closeProjectModal();
      }
    });

    loadProjects();
    updateDeadlineClock();
    setInterval(loadProjects, 30000);
    setInterval(updateDeadlineClock, 1000);
  </script>
</body>
</html>
