<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>키오스크 진행 상황</title>
  <link rel="stylesheet" href="/kiosk.css">
  <link rel="stylesheet" href="/kiosk-print.css" media="print">
</head>
<body>
  <main>
    <section class="header">
      <h1>사용자별 진행 상황</h1>
      <p>사용자 ID를 터치하면 개인 진행상황을 확인할 수 있습니다</p>
    </section>

    <p id="message">불러오는 중...</p>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>사용자</th>
            <th>진행 상황</th>
          </tr>
        </thead>
        <tbody id="students"></tbody>
      </table>
    </div>
  </main>

  <div class="modal" id="studentModal">
    <div class="modal_body" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <h2 id="modalTitle">개인 진행 상황</h2>
      <div class="student-id" id="modalStudentId">-</div>
      <div class="student-progress" id="modalStudentProgress">-</div>
      <div class="progress-bar modal-progress-bar" aria-hidden="true">
        <div class="progress-fill" id="modalProgressFill"></div>
      </div>
      <div class="modal-actions">
        <button id="closeModalButton" type="button">닫기</button>


        
      </div>
    </div>
  </div>

  <script>
    const progressPercent = {
      "기획": 0,
      "프로토타입": 25,
      "실제 제작 시작": 50,
      "최종 테스트": 75,
      "완료": 100
    };

    function getProgressPercent(progress) {
      return progressPercent[progress] ?? 0;
    }

    function getApiUrl() {
      if (location.protocol === "file:") {
        return "http://localhost:703/api/students";
      }

      return "/api/students";
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    async function readJson(response) {
      const contentType = response.headers.get("content-type") || "";

      if (!contentType.includes("application/json")) {
        const text = await response.text();
        const preview = text.trim().slice(0, 40);
        throw new Error(`API가 JSON이 아닌 응답을 반환했습니다: ${preview}`);
      }

      return response.json();
    }

    async function loadStudents() {
      const message = document.getElementById("message");
      const tbody = document.getElementById("students");

      try {
        const response = await fetch(getApiUrl());
        const data = await readJson(response);

        if (!response.ok) {
          throw new Error(data.message || data.error || "데이터를 불러오지 못했습니다.");
        }

        tbody.innerHTML = data.students.map((student) => {
          const percent = getProgressPercent(student.progress);

          return `
            <tr tabindex="0" data-id="${escapeHtml(student.id)}" data-progress="${escapeHtml(student.progress)}" data-percent="${percent}">
              <td>${escapeHtml(student.id)}</td>
              <td>
                <div class="progress-cell">
                  <span>${escapeHtml(student.progress)}</span>
                  <div class="progress-bar" aria-label="${escapeHtml(student.progress)} ${percent}%">
                    <div class="progress-fill" style="width: ${percent}%"></div>
                  </div>
                </div>
              </td>
            </tr>
          `;
        }).join("");

        message.textContent = `${data.students.length}명 표시 중`;
      } catch (error) {
        message.textContent = `오류: ${error.message}`;
      }
    }

    const modal = document.getElementById("studentModal");
    const closeModalButton = document.getElementById("closeModalButton");
    const modalStudentId = document.getElementById("modalStudentId");
    const modalStudentProgress = document.getElementById("modalStudentProgress");
    const modalProgressFill = document.getElementById("modalProgressFill");
    const studentsTable = document.getElementById("students");

    function openStudentModal(row) {
      modalStudentId.textContent = row.dataset.id;
      modalStudentProgress.textContent = row.dataset.progress;
      modalProgressFill.style.width = `${row.dataset.percent}%`;
      modal.classList.add("open");
    }

    function closeStudentModal() {
      modal.classList.remove("open");
    }

    studentsTable.addEventListener("click", (event) => {
      const row = event.target.closest("tr");
      if (row) openStudentModal(row);
    });

    studentsTable.addEventListener("keydown", (event) => {
      if (event.key !== "Enter" && event.key !== " ") return;
      const row = event.target.closest("tr");
      if (row) {
        event.preventDefault();
        openStudentModal(row);
      }
    });

    modal.addEventListener("click", (event) => {
      if (event.target === modal) closeStudentModal();
    });

    closeModalButton.addEventListener("click", closeStudentModal);

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") closeStudentModal();
    });

    loadStudents();
    setInterval(loadStudents, 30000);
  </script>
</body>
</html>
