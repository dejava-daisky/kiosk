<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>관리자 페이지</title>
  <style>
    :root {
      --bg: #eef3f7;
      --ink: #17212b;
      --muted: #647182;
      --panel: #ffffff;
      --line: #d6dee8;
      --blue: #245b9d;
      --teal: #0f6c73;
      --red: #b23b3b;
      --yellow: #f0c34e;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 28px;
      color: var(--ink);
      background:
        linear-gradient(90deg, rgba(36, 91, 157, .06) 1px, transparent 1px),
        linear-gradient(180deg, rgba(36, 91, 157, .05) 1px, transparent 1px),
        var(--bg);
      background-size: 40px 40px;
      font-family: "Segoe UI", "Noto Sans KR", Arial, sans-serif;
    }

    main {
      width: min(1120px, 100%);
      margin: 0 auto;
    }

    .header,
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 14px 34px rgba(23, 33, 43, .1);
    }

    .header {
      margin-bottom: 18px;
      padding: 24px;
      color: white;
      background: #1f3c63;
      border-bottom: 6px solid var(--yellow);
    }

    h1 {
      margin: 0;
      font-size: 32px;
    }

    .header p {
      margin: 8px 0 0;
      color: rgba(255, 255, 255, .78);
      font-weight: 800;
    }

    .deadline-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
    }

    .deadline-bar span {
      padding: 9px 12px;
      color: #20344d;
      background: rgba(255, 255, 255, .92);
      border-radius: 7px;
      font-weight: 900;
    }

    .deadline-bar strong {
      color: var(--teal);
    }

    .deadline-editor {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: end;
      margin-top: 14px;
      padding: 12px;
      background: rgba(255, 255, 255, .14);
      border: 1px solid rgba(255, 255, 255, .28);
      border-radius: 8px;
    }

    .deadline-editor label {
      color: white;
      min-width: 220px;
    }

    .deadline-editor input {
      min-height: 42px;
      padding: 0 12px;
      color: var(--ink);
      background: white;
      border: 0;
      border-radius: 7px;
      font-weight: 900;
    }

    .deadline-editor button {
      width: auto;
      min-height: 42px;
      padding: 0 16px;
      color: #17304f;
      background: var(--yellow);
    }

    .panel {
      padding: 22px;
    }

    form {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 14px;
      margin-bottom: 18px;
    }

    label {
      display: grid;
      gap: 7px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 900;
    }

    input,
    select,
    textarea,
    button {
      width: 100%;
      min-height: 46px;
      border-radius: 7px;
      font: inherit;
    }

    input,
    select,
    textarea {
      padding: 12px 14px;
      color: var(--ink);
      background: #fbfcfe;
      border: 1px solid #becad7;
      font-weight: 800;
    }

    textarea {
      resize: vertical;
      min-height: 92px;
    }

    .wide {
      grid-column: 1 / -1;
    }

    .button-row {
      display: flex;
      gap: 10px;
      grid-column: 1 / -1;
    }

    button {
      color: white;
      border: 0;
      font-weight: 900;
      cursor: pointer;
    }

    .save-button { background: var(--teal); }
    .delete-button { background: var(--red); }
    .ghost-button { background: var(--blue); }

    #message {
      min-height: 22px;
      margin: 0 0 14px;
      color: var(--blue);
      font-weight: 900;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      overflow: hidden;
      border-radius: 8px;
    }

    th,
    td {
      padding: 16px;
      border-bottom: 1px solid #dce4ed;
      text-align: left;
      vertical-align: top;
    }

    th {
      color: #33475f;
      background: #f8fafc;
      font-size: 14px;
      font-weight: 900;
    }

    tr:last-child td {
      border-bottom: 0;
    }

    tbody tr {
      cursor: pointer;
    }

    tbody tr:hover,
    tbody tr:focus-visible {
      background: #eef9fb;
      outline: none;
    }

    .project-cell {
      display: grid;
      gap: 6px;
    }

    .feedback-cell {
      color: #7a3b00;
      font-weight: 900;
      line-height: 1.35;
    }

    .row-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .small-button {
      min-height: 36px;
      padding: 0 12px;
    }

    .modal {
      display: none;
      position: fixed;
      inset: 0;
      padding: 24px;
      background: rgba(13, 22, 34, .58);
      z-index: 20;
    }

    .modal.open {
      display: grid;
      place-items: center;
    }

    .modal-body {
      width: min(620px, 100%);
      max-height: calc(100vh - 48px);
      overflow: auto;
      padding: 24px;
      background: white;
      border: 1px solid #d6dee8;
      border-radius: 8px;
      box-shadow: 0 22px 60px rgba(0, 0, 0, .24);
    }

    .modal-body h2 {
      margin: 0 0 12px;
    }

    .project-list {
      display: grid;
      gap: 10px;
    }

    .project-option {
      display: grid;
      gap: 6px;
      width: 100%;
      height: auto;
      min-height: 78px;
      padding: 14px;
      color: var(--ink);
      background: #f8fafc;
      border: 1px solid #dce4ed;
      text-align: left;
    }

    .project-option strong {
      color: var(--blue);
      font-size: 20px;
    }

    .project-option span,
    .project-option em {
      color: var(--muted);
      font-style: normal;
      font-weight: 800;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      margin-top: 18px;
    }

    @media (max-width: 800px) {
      body { padding: 16px; }
      form { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main>
    <section class="header">
      <h1>관리자 페이지</h1>
      <p>사용자를 선택한 뒤 프로젝트를 골라 수정하거나 삭제합니다</p>
      <div class="deadline-bar">
        <span>지금 시간: <strong id="currentTime">-</strong></span>
        <span>최종 마감: <strong id="deadlineText">2026-07-31</strong></span>
        <span>남은 시간: <strong id="deadlineCountdown">-</strong></span>
      </div>
      <form class="deadline-editor" id="deadlineForm">
        <label>
          최종 마감일
          <input id="deadlineInput" type="date" required>
        </label>
        <button type="submit">마감일 저장</button>
      </form>
    </section>

    <section class="panel">
      <form id="projectForm">
        <input id="projectId" type="hidden">

        <label>
          학생 ID
          <input id="studentId" type="text" placeholder="kopo01" required>
        </label>

        <label>
          프로젝트 이름
          <input id="projectName" type="text" placeholder="프로젝트 A" required>
        </label>

        <label>
          진행상황
          <select id="progress" required>
            <option value="">선택</option>
            <option value="기획">기획</option>
            <option value="프로토타입">프로토타입</option>
            <option value="실제 제작 시작">실제 제작 시작</option>
            <option value="최종 테스트">최종 테스트</option>
            <option value="완료">완료</option>
          </select>
        </label>

        <label class="wide">
          배포판 링크
          <input id="deploymentUrl" type="url" placeholder="https://example.com/kopo01" inputmode="url">
        </label>

        <label class="wide">
          피드백 (교수님)
          <textarea id="professorFeedback" placeholder="교수 피드백을 입력하세요"></textarea>
        </label>

        <div class="button-row">
          <button class="save-button" type="submit">저장</button>
          <button class="delete-button" id="deleteButton" type="button">삭제</button>
          <button class="ghost-button" id="resetButton" type="button">초기화</button>
        </div>
      </form>

      <p id="message"></p>

      <table>
        <thead>
          <tr>
            <th>사용자</th>
            <th>프로젝트 수</th>
            <th>코멘트</th>
          </tr>
        </thead>
        <tbody id="users"></tbody>
      </table>
    </section>
  </main>

  <div class="modal" id="userModal">
    <div class="modal-body" role="dialog" aria-modal="true" aria-labelledby="userModalTitle">
      <h2 id="userModalTitle">사용자 프로젝트</h2>
      <div class="project-list" id="userProjectList"></div>
      <div class="modal-actions">
        <button class="ghost-button small-button" id="closeUserModalButton" type="button">닫기</button>
      </div>
    </div>
  </div>

  <script>
    const projectForm = document.getElementById("projectForm");
    const projectIdInput = document.getElementById("projectId");
    const studentIdInput = document.getElementById("studentId");
    const projectNameInput = document.getElementById("projectName");
    const progressInput = document.getElementById("progress");
    const deploymentUrlInput = document.getElementById("deploymentUrl");
    const professorFeedbackInput = document.getElementById("professorFeedback");
    const deleteButton = document.getElementById("deleteButton");
    const resetButton = document.getElementById("resetButton");
    const message = document.getElementById("message");
    const usersTable = document.getElementById("users");
    const userModal = document.getElementById("userModal");
    const userProjectList = document.getElementById("userProjectList");
    const closeUserModalButton = document.getElementById("closeUserModalButton");
    const deadlineForm = document.getElementById("deadlineForm");
    const deadlineInput = document.getElementById("deadlineInput");
    let latestProjects = [];
    let latestUsers = [];
    let currentDeadline = "2026-07-31";

    function getProjectsApiUrl() {
      if (location.protocol === "file:") {
        return "http://localhost:703/api/projects";
      }

      return "/api/projects";
    }

    function getSettingsApiUrl() {
      if (location.protocol === "file:") {
        return "http://localhost:703/api/settings";
      }

      return "/api/settings";
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function pad(value) {
      return String(value).padStart(2, "0");
    }

    function formatCurrentTime(date) {
      return [
        date.getFullYear(),
        pad(date.getMonth() + 1),
        pad(date.getDate())
      ].join("-") + " " + [
        pad(date.getHours()),
        pad(date.getMinutes())
      ].join(":");
    }

    function formatDeadlineCountdown(now, deadline) {
      const diffMs = deadline.getTime() - now.getTime();

      if (diffMs <= 0) {
        return "D-day";
      }

      const totalMinutes = Math.floor(diffMs / 60000);
      const days = Math.floor(totalMinutes / 1440);
      const hours = Math.floor((totalMinutes % 1440) / 60);
      const minutes = totalMinutes % 60;

      return `D-${days} ${hours}h ${minutes}m`;
    }

    function updateDeadlineClock() {
      const now = new Date();
      const [year, month, day] = currentDeadline.split("-").map(Number);
      const deadline = new Date(year, month - 1, day, 23, 59, 59);

      document.getElementById("currentTime").textContent = formatCurrentTime(now);
      document.getElementById("deadlineText").textContent = currentDeadline;
      document.getElementById("deadlineCountdown").textContent = formatDeadlineCountdown(now, deadline);
    }

    async function readJson(response) {
      const data = await response.json();

      if (!response.ok) {
        throw new Error(data.message || data.error || "요청을 처리하지 못했습니다.");
      }

      return data;
    }

    function groupProjectsByStudent(projects) {
      const groups = new Map();

      projects.forEach((project) => {
        if (!groups.has(project.studentId)) {
          groups.set(project.studentId, {
            studentId: project.studentId,
            projects: [],
            latestComment: ""
          });
        }

        const group = groups.get(project.studentId);
        group.projects.push(project);
        if (project.latestComment) {
          group.latestComment = project.latestComment;
        }
      });

      return [...groups.values()];
    }

    function fillForm(project) {
      projectIdInput.value = project.id;
      studentIdInput.value = project.studentId;
      projectNameInput.value = project.projectName;
      progressInput.value = project.progress;
      deploymentUrlInput.value = project.deploymentUrl || "";
      professorFeedbackInput.value = project.professorFeedback || "";
    }

    function resetForm() {
      projectIdInput.value = "";
      projectForm.reset();
    }

    function openUserModal(user) {
      document.getElementById("userModalTitle").textContent = `${user.studentId} 프로젝트`;
      userProjectList.innerHTML = user.projects.map((project) => `
        <button class="project-option" type="button" data-project-id="${project.id}">
          <strong>${escapeHtml(project.projectName)}</strong>
          <span>진행상황: ${escapeHtml(project.progress)}</span>
          <em>${project.latestComment ? escapeHtml(project.latestComment) : "코멘트 없음"}</em>
        </button>
      `).join("");
      userModal.classList.add("open");
    }

    function closeUserModal() {
      userModal.classList.remove("open");
    }

    async function loadProjects() {
      try {
        const response = await fetch(getProjectsApiUrl());
        const data = await readJson(response);
        latestProjects = data.projects;
        latestUsers = groupProjectsByStudent(data.projects);

        usersTable.innerHTML = latestUsers.map((user, index) => `
          <tr tabindex="0" data-index="${index}">
            <td>${escapeHtml(user.studentId)}</td>
            <td>
              <div class="project-cell">
                <strong>${user.projects.length}개</strong>
                <span>${escapeHtml(user.projects.map((project) => project.projectName).join(", "))}</span>
              </div>
            </td>
            <td class="feedback-cell">${user.latestComment ? escapeHtml(user.latestComment) : "-"}</td>
          </tr>
        `).join("");

        message.textContent = `${latestUsers.length}명 / ${data.projects.length}개 프로젝트 표시 중`;
      } catch (error) {
        message.textContent = `오류: ${error.message}`;
      }
    }

    async function loadSettings() {
      try {
        const response = await fetch(getSettingsApiUrl());
        const data = await readJson(response);
        currentDeadline = data.settings.deadline || "2026-07-31";
        deadlineInput.value = currentDeadline;
        updateDeadlineClock();
      } catch (error) {
        message.textContent = `오류: ${error.message}`;
      }
    }

    projectForm.addEventListener("submit", async (event) => {
      event.preventDefault();

      const payload = {
        studentId: studentIdInput.value,
        projectName: projectNameInput.value,
        progress: progressInput.value,
        deploymentUrl: deploymentUrlInput.value,
        professorFeedback: professorFeedbackInput.value
      };

      try {
        const projectId = projectIdInput.value.trim();
        const response = await fetch(projectId ? `${getProjectsApiUrl()}/${projectId}` : getProjectsApiUrl(), {
          method: projectId ? "PUT" : "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        const data = await readJson(response);
        message.textContent = `${data.project.studentId} / ${data.project.projectName} 저장 완료`;
        resetForm();
        await loadProjects();
      } catch (error) {
        message.textContent = `오류: ${error.message}`;
      }
    });

    deadlineForm.addEventListener("submit", async (event) => {
      event.preventDefault();

      try {
        const response = await fetch(`${getSettingsApiUrl()}/deadline`, {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ deadline: deadlineInput.value })
        });
        const data = await readJson(response);
        currentDeadline = data.settings.deadline;
        message.textContent = `최종 마감일 저장 완료: ${currentDeadline}`;
        updateDeadlineClock();
      } catch (error) {
        message.textContent = `오류: ${error.message}`;
      }
    });

    deleteButton.addEventListener("click", async () => {
      const projectId = projectIdInput.value.trim();

      if (!projectId) {
        message.textContent = "삭제할 프로젝트를 먼저 선택하세요.";
        return;
      }

      try {
        await readJson(await fetch(`${getProjectsApiUrl()}/${projectId}`, { method: "DELETE" }));
        message.textContent = "프로젝트 삭제 완료";
        resetForm();
        await loadProjects();
      } catch (error) {
        message.textContent = `오류: ${error.message}`;
      }
    });

    resetButton.addEventListener("click", resetForm);

    usersTable.addEventListener("click", (event) => {
      const row = event.target.closest("tr");
      if (!row) return;

      const user = latestUsers[Number(row.dataset.index)];
      if (user) openUserModal(user);
    });

    usersTable.addEventListener("keydown", (event) => {
      if (event.key !== "Enter" && event.key !== " ") return;
      const row = event.target.closest("tr");
      if (!row) return;

      event.preventDefault();
      const user = latestUsers[Number(row.dataset.index)];
      if (user) openUserModal(user);
    });

    userProjectList.addEventListener("click", (event) => {
      const button = event.target.closest("[data-project-id]");
      if (!button) return;

      const project = latestProjects.find((item) => item.id === Number(button.dataset.projectId));
      if (!project) return;

      fillForm(project);
      closeUserModal();
      message.textContent = `${project.studentId} / ${project.projectName} 선택됨`;
    });

    userModal.addEventListener("click", (event) => {
      if (event.target === userModal) {
        closeUserModal();
      }
    });

    closeUserModalButton.addEventListener("click", closeUserModal);

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") {
        closeUserModal();
      }
    });

    loadProjects();
    loadSettings();
    setInterval(updateDeadlineClock, 1000);
  </script>
</body>
</html>
