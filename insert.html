<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>진행상황 입력</title>
  <style>
    :root {
      --bg: #eef3f7;
      --ink: #17212b;
      --muted: #647182;
      --panel: #ffffff;
      --line: #d6dee8;
      --blue: #245b9d;
      --teal: #008a92;
      --yellow: #f0c34e;
    }

    * { box-sizing: border-box; }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      color: var(--ink);
      background:
        linear-gradient(90deg, rgba(36, 91, 157, .06) 1px, transparent 1px),
        linear-gradient(180deg, rgba(36, 91, 157, .05) 1px, transparent 1px),
        var(--bg);
      background-size: 40px 40px;
      font-family: "Segoe UI", "Pretendard", "Noto Sans KR", Arial, sans-serif;
    }

    .panel {
      width: min(460px, 100%);
      overflow: hidden;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 18px 44px rgba(23, 33, 43, .14);
    }

    .panel-header {
      padding: 24px;
      color: white;
      background: #1f3c63;
      border-bottom: 6px solid var(--yellow);
    }

    h1 {
      margin: 0;
      font-size: 30px;
      line-height: 1.1;
      letter-spacing: 0;
    }

    .panel-header p {
      margin: 8px 0 0;
      color: rgba(255, 255, 255, .78);
      font-weight: 700;
    }

    form {
      display: grid;
      gap: 18px;
      padding: 24px;
    }

    label {
      display: grid;
      gap: 8px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 900;
    }

    input,
    select,
    button {
      width: 100%;
      min-height: 48px;
      border-radius: 7px;
      font: inherit;
    }

    input,
    select {
      padding: 0 14px;
      color: var(--ink);
      background: #fbfcfe;
      border: 1px solid #becad7;
      font-size: 18px;
      font-weight: 800;
    }

    button {
      margin-top: 4px;
      color: white;
      background: var(--teal);
      border: 0;
      font-weight: 950;
      cursor: pointer;
    }

    input:focus-visible,
    select:focus-visible,
    button:focus-visible {
      outline: 3px solid rgba(0, 138, 146, .28);
      outline-offset: 2px;
    }

    #message {
      min-height: 22px;
      margin: 0;
      color: var(--blue);
      font-weight: 900;
    }
  </style>
</head>
<body>
  <section class="panel">
    <div class="panel-header">
      <h1>진행상황 입력</h1>
      <p>본인 ID와 현재 상태만 저장합니다</p>
    </div>

    <form id="studentForm">
      <label>
        본인 ID
        <input id="id" name="id" type="text" placeholder="kopo01" required>
      </label>

      <label>
        진행상황
        <select id="progress" name="progress" required>
          <option value="">선택</option>
          <option value="기획">기획</option>
          <option value="프로토타입">프로토타입</option>
          <option value="실제 제작 시작">실제 제작 시작</option>
          <option value="최종 테스트">최종 테스트</option>
          <option value="완료">완료</option>
        </select>
      </label>

      <button type="submit">저장</button>
      <p id="message"></p>
    </form>
  </section>

  <script>
    function getApiUrl() {
      if (location.protocol === "file:") {
        return "http://localhost:703/api/students";
      }

      return "/api/students";
    }

    document.getElementById("studentForm").addEventListener("submit", async (event) => {
      event.preventDefault();

      const message = document.getElementById("message");
      const payload = {
        id: document.getElementById("id").value,
        progress: document.getElementById("progress").value
      };

      try {
        const response = await fetch(getApiUrl(), {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.message || "저장하지 못했습니다.");
        }

        message.textContent = "저장했습니다.";
      } catch (error) {
        message.textContent = `오류: ${error.message}`;
      }
    });
  </script>
</body>
</html>
