<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>프로젝트 입력</title>
  <style>
    :root {
      --bg: #eef3f7;
      --ink: #17212b;
      --muted: #647182;
      --panel: #ffffff;
      --line: #d6dee8;
      --blue: #245b9d;
      --teal: #008a92;
      --yellow: #f0c34e;
    }

    * { box-sizing: border-box; }

    body {
      min-height: 100vh;
      margin: 0;
      padding: 24px;
      color: var(--ink);
      background:
        linear-gradient(90deg, rgba(36, 91, 157, .06) 1px, transparent 1px),
        linear-gradient(180deg, rgba(36, 91, 157, .05) 1px, transparent 1px),
        var(--bg);
      background-size: 40px 40px;
      font-family: "Segoe UI", "Pretendard", "Noto Sans KR", Arial, sans-serif;
    }

    .layout {
      width: min(960px, 100%);
      margin: 0 auto;
      display: grid;
      gap: 18px;
    }

    .panel {
      overflow: hidden;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 18px 44px rgba(23, 33, 43, .14);
    }

    .panel-header {
      padding: 24px;
      color: white;
      background: #1f3c63;
      border-bottom: 6px solid var(--yellow);
    }

    h1 {
      margin: 0;
      font-size: 30px;
      line-height: 1.1;
    }

    .panel-header p {
      margin: 8px 0 0;
      color: rgba(255, 255, 255, .78);
      font-weight: 700;
    }

    form {
      display: grid;
      gap: 18px;
      padding: 24px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 16px;
    }

    label {
      display: grid;
      gap: 8px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 900;
    }

    input,
    select,
    button {
      width: 100%;
      min-height: 48px;
      border-radius: 7px;
      font: inherit;
    }

    input,
    select {
      padding: 0 14px;
      color: var(--ink);
      background: #fbfcfe;
      border: 1px solid #becad7;
      font-size: 18px;
      font-weight: 800;
    }

    button {
      color: white;
      background: var(--teal);
      border: 0;
      font-weight: 950;
      cursor: pointer;
    }

    #message {
      min-height: 22px;
      margin: 0;
      color: var(--blue);
      font-weight: 900;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th,
    td {
      padding: 14px 18px;
      border-bottom: 1px solid var(--line);
      text-align: left;
    }

    th {
      color: #33475f;
      background: #f8fafc;
      font-size: 14px;
      font-weight: 900;
    }

    tr:last-child td {
      border-bottom: 0;
    }

    @media (max-width: 760px) {
      body { padding: 16px; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="layout">
    <section class="panel">
      <div class="panel-header">
        <h1>프로젝트 입력</h1>
        <p>한 사람이 여러 프로젝트를 등록하고 관리할 수 있습니다</p>
      </div>

      <form id="projectForm">
        <div class="grid">
          <label>
            본인 ID
            <input id="studentId" type="text" placeholder="kopo01" required>
          </label>

          <label>
            프로젝트 이름
            <input id="projectName" type="text" placeholder="프로젝트 A" required>
          </label>

          <label>
            진행상황
            <select id="progress" required>
              <option value="">선택</option>
              <option value="기획">기획</option>
              <option value="프로토타입">프로토타입</option>
              <option value="실제 제작 시작">실제 제작 시작</option>
              <option value="최종 테스트">최종 테스트</option>
              <option value="완료">완료</option>
            </select>
          </label>
        </div>

        <button type="submit">저장</button>
        <p id="message"></p>
      </form>
    </section>

    <section class="panel">
      <div class="panel-header">
        <h1>등록된 프로젝트</h1>
        <p>같은 ID로 여러 프로젝트가 저장됩니다</p>
      </div>
      <table>
        <thead>
          <tr>
            <th>사용자</th>
            <th>프로젝트</th>
            <th>진행상황</th>
          </tr>
        </thead>
        <tbody id="projects"></tbody>
      </table>
    </section>
  </div>

  <script>
    const projectForm = document.getElementById("projectForm");
    const studentIdInput = document.getElementById("studentId");
    const projectNameInput = document.getElementById("projectName");
    const progressInput = document.getElementById("progress");
    const message = document.getElementById("message");
    const projectsTable = document.getElementById("projects");

    function getProjectsApiUrl() {
      if (location.protocol === "file:") {
        return "http://localhost:703/api/projects";
      }

      return "/api/projects";
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    async function readJson(response) {
      const data = await response.json();

      if (!response.ok) {
        throw new Error(data.message || data.error || "저장하지 못했습니다.");
      }

      return data;
    }

    async function loadProjects() {
      try {
        const response = await fetch(getProjectsApiUrl());
        const data = await readJson(response);

        projectsTable.innerHTML = data.projects.map((project) => `
          <tr>
            <td>${escapeHtml(project.studentId)}</td>
            <td>${escapeHtml(project.projectName)}</td>
            <td>${escapeHtml(project.progress)}</td>
          </tr>
        `).join("");
      } catch (error) {
        message.textContent = `오류: ${error.message}`;
      }
    }

    projectForm.addEventListener("submit", async (event) => {
      event.preventDefault();

      const payload = {
        studentId: studentIdInput.value,
        projectName: projectNameInput.value,
        progress: progressInput.value,
        professorFeedback: ""
      };

      try {
        const response = await fetch(getProjectsApiUrl(), {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        const data = await readJson(response);
        message.textContent = `${data.project.studentId} / ${data.project.projectName} 저장 완료`;
        projectNameInput.value = "";
        progressInput.value = "";
        await loadProjects();
      } catch (error) {
        message.textContent = `오류: ${error.message}`;
      }
    });

    loadProjects();
  </script>
</body>
</html>
