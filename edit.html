<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>프로젝트 수정</title>
  <style>
    :root {
      --bg: #eef3f7;
      --ink: #17212b;
      --muted: #647182;
      --panel: #ffffff;
      --line: #d6dee8;
      --blue: #245b9d;
      --teal: #008a92;
      --yellow: #f0c34e;
    }

    * { box-sizing: border-box; }

    body {
      min-height: 100vh;
      margin: 0;
      padding: 24px;
      color: var(--ink);
      background:
        linear-gradient(90deg, rgba(36, 91, 157, .06) 1px, transparent 1px),
        linear-gradient(180deg, rgba(36, 91, 157, .05) 1px, transparent 1px),
        var(--bg);
      background-size: 40px 40px;
      font-family: "Segoe UI", "Pretendard", "Noto Sans KR", Arial, sans-serif;
    }

    .page-shell {
      display: grid;
      gap: 12px;
      width: min(860px, 100%);
      margin: 0 auto;
    }

    .top-nav {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    .top-nav a {
      min-width: 104px;
      padding: 12px 16px;
      color: var(--blue);
      background: rgba(255, 255, 255, .9);
      border: 1px solid var(--line);
      border-radius: 7px;
      text-align: center;
      text-decoration: none;
      font-size: 16px;
      font-weight: 950;
      box-shadow: 0 8px 20px rgba(23, 33, 43, .08);
    }

    .top-nav a.active {
      color: white;
      background: var(--teal);
      border-color: var(--teal);
    }

    .panel {
      overflow: hidden;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 18px 44px rgba(23, 33, 43, .14);
    }

    .panel-header {
      padding: 24px;
      color: white;
      background: #1f3c63;
      border-bottom: 6px solid var(--yellow);
    }

    h1 {
      margin: 0;
      font-size: 30px;
      line-height: 1.1;
    }

    .panel-header p {
      margin: 8px 0 0;
      color: rgba(255, 255, 255, .78);
      font-weight: 700;
    }

    .body {
      display: grid;
      gap: 18px;
      padding: 24px;
    }

    form,
    .search-row {
      display: grid;
      gap: 14px;
    }

    .search-row {
      grid-template-columns: 1fr auto;
      align-items: end;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    label {
      display: grid;
      gap: 8px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 900;
    }

    input,
    select,
    button {
      width: 100%;
      min-height: 48px;
      border-radius: 7px;
      font: inherit;
    }

    input,
    select {
      padding: 0 14px;
      color: var(--ink);
      background: #fbfcfe;
      border: 1px solid #becad7;
      font-size: 18px;
      font-weight: 800;
    }

    button {
      color: white;
      background: var(--teal);
      border: 0;
      font-weight: 950;
      cursor: pointer;
    }

    .project-list {
      display: grid;
      gap: 10px;
    }

    .project-option {
      display: grid;
      gap: 4px;
      min-height: 64px;
      padding: 12px;
      color: var(--ink);
      background: #f8fafc;
      border: 1px solid var(--line);
      text-align: left;
    }

    .project-option strong {
      color: var(--blue);
      font-size: 18px;
    }

    .project-option span {
      color: var(--muted);
      font-weight: 800;
    }

    .hidden {
      display: none;
    }

    #message {
      min-height: 22px;
      margin: 0;
      color: var(--blue);
      font-weight: 900;
    }

    @media (max-width: 760px) {
      body { padding: 16px; }
      .search-row,
      .grid { grid-template-columns: 1fr; }
      .top-nav { justify-content: stretch; }
      .top-nav a {
        flex: 1;
        min-width: 0;
      }
    }
  </style>
</head>
<body>
  <div class="page-shell">
    <nav class="top-nav" aria-label="page navigation">
      <a href="/kiosk" data-nav-route="kiosk">Kiosk</a>
      <a href="/insert" data-nav-route="insert">Insert</a>
      <a href="/edit" data-nav-route="edit" class="active">정보 수정</a>
    </nav>

    <section class="panel">
      <div class="panel-header">
        <h1>프로젝트 수정</h1>
        <p>ID로 등록된 프로젝트를 조회하고 본인이 직접 수정합니다</p>
      </div>

      <div class="body">
        <div class="search-row">
          <label>
            본인 ID
            <input id="studentId" type="text" placeholder="kopo01" required>
          </label>
          <button id="searchButton" type="button">조회</button>
        </div>

        <div class="project-list" id="projectList"></div>

        <form id="editForm" class="hidden">
          <input id="projectId" type="hidden">
          <div class="grid">
            <label>
              프로젝트 이름
              <input id="projectName" type="text" required>
            </label>

            <label>
              진행상황
              <select id="progress" required>
                <option value="">선택</option>
                <option value="기획">기획</option>
                <option value="프로토타입">프로토타입</option>
                <option value="실제 제작 시작">실제 제작 시작</option>
                <option value="최종 테스트">최종 테스트</option>
                <option value="완료">완료</option>
              </select>
            </label>
          </div>

          <label>
            배포판 링크
            <input id="deploymentUrl" type="url" placeholder="https://example.com/kopo01" inputmode="url">
          </label>

          <button type="submit">수정 저장</button>
        </form>

        <p id="message"></p>
      </div>
    </section>
  </div>

  <script>
    const studentIdInput = document.getElementById("studentId");
    const searchButton = document.getElementById("searchButton");
    const projectList = document.getElementById("projectList");
    const editForm = document.getElementById("editForm");
    const projectIdInput = document.getElementById("projectId");
    const projectNameInput = document.getElementById("projectName");
    const progressInput = document.getElementById("progress");
    const deploymentUrlInput = document.getElementById("deploymentUrl");
    const message = document.getElementById("message");
    let foundProjects = [];
    let selectedProject = null;

    function setTopNavLinks() {
      document.querySelectorAll("[data-nav-route]").forEach((link) => {
        link.href = `${location.origin}/${link.dataset.navRoute}`;
      });
    }

    function getProjectsApiUrl() {
      if (location.protocol === "file:") {
        return "http://localhost:703/api/projects";
      }

      return "/api/projects";
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    async function readJson(response) {
      const data = await response.json();

      if (!response.ok) {
        throw new Error(data.message || data.error || "요청을 처리하지 못했습니다.");
      }

      return data;
    }

    function clearEditor() {
      selectedProject = null;
      editForm.classList.add("hidden");
      editForm.reset();
      projectIdInput.value = "";
    }

    function selectProject(project) {
      selectedProject = project;
      projectIdInput.value = project.id;
      projectNameInput.value = project.projectName;
      progressInput.value = project.progress;
      deploymentUrlInput.value = project.deploymentUrl || "";
      editForm.classList.remove("hidden");
      message.textContent = `${project.projectName} 선택됨`;
    }

    async function searchProjects() {
      const studentId = studentIdInput.value.trim();
      clearEditor();
      projectList.innerHTML = "";

      if (!studentId) {
        message.textContent = "본인 ID를 입력하세요.";
        return;
      }

      try {
        const data = await readJson(await fetch(getProjectsApiUrl()));
        foundProjects = data.projects.filter((project) => project.studentId === studentId);

        if (!foundProjects.length) {
          message.textContent = `${studentId}로 등록된 프로젝트가 없습니다.`;
          return;
        }

        projectList.innerHTML = foundProjects.map((project, index) => `
          <button class="project-option" type="button" data-index="${index}">
            <strong>${escapeHtml(project.projectName)}</strong>
            <span>${escapeHtml(project.progress)}</span>
          </button>
        `).join("");
        message.textContent = `${foundProjects.length}개 프로젝트 조회됨`;
      } catch (error) {
        message.textContent = `오류: ${error.message}`;
      }
    }

    setTopNavLinks();

    searchButton.addEventListener("click", searchProjects);

    studentIdInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        event.preventDefault();
        searchProjects();
      }
    });

    projectList.addEventListener("click", (event) => {
      const button = event.target.closest("[data-index]");
      if (!button) return;
      selectProject(foundProjects[Number(button.dataset.index)]);
    });

    editForm.addEventListener("submit", async (event) => {
      event.preventDefault();

      if (!selectedProject) {
        message.textContent = "수정할 프로젝트를 먼저 선택하세요.";
        return;
      }

      const payload = {
        studentId: studentIdInput.value,
        projectName: projectNameInput.value,
        progress: progressInput.value,
        deploymentUrl: deploymentUrlInput.value,
        professorFeedback: selectedProject.professorFeedback || ""
      };

      try {
        const data = await readJson(await fetch(`${getProjectsApiUrl()}/${projectIdInput.value}`, {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        }));

        message.textContent = `${data.project.studentId} / ${data.project.projectName} 수정 완료`;
        await searchProjects();
      } catch (error) {
        message.textContent = `오류: ${error.message}`;
      }
    });
  </script>
</body>
</html>
